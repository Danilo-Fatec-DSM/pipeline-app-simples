name: App Simples

on: 
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
            node-version: 24

      - name: Gerar Artefato
        runs: zip -r app.zip

      - name: Publicar Artefato
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: app.zip
